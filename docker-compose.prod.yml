services:
  backend:
    image: vivekrana2012/divid-backend:latest
    ports:
      - "18080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DIVID_DATA_DIR: /data
    volumes:
      - ${DIVID_HOST_DATA_DIR:-./data}:/data
    restart: unless-stopped

  frontend:
    image: vivekrana2012/divid-frontend:latest
    ports:
      - "18081:80"
    depends_on:
      - backend
    restart: unless-stopped
