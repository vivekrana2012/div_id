services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-32-char-secret-key}
      DIVID_DATA_DIR: /data
    volumes:
      - divid_data:/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  divid_data:
