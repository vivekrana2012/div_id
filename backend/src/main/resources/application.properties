# Server
server.port=8080
spring.application.name=divid

# SQLite
spring.datasource.url=jdbc:sqlite:${DIVID_DATA_DIR:./data}/divid.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# Security
divid.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-32chars}
divid.jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
